<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今彩 539 智慧選號助手 - 招財犬版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .ball {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: popIn 0.5s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .lottery-gradient {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden relative">
        <!-- 頁首與商標 -->
        <div class="lottery-gradient p-6 text-white text-center relative">
            <div class="flex flex-col items-center gap-3">
                <!-- 招財犬商標 -->
                <div class="relative">
                    <div class="w-20 h-20 rounded-full border-4 border-yellow-400 shadow-lg overflow-hidden bg-white">
                        <!-- 確保此處指向您提供的檔案 -->
                        <img src="IMG_6918.jpg" alt="招財金牌獵犬" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute -bottom-1 -right-1 bg-yellow-400 text-[#be123c] p-1 rounded-full shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-wider">今彩 539 智慧選號</h1>
                    <p class="text-sm opacity-80 mt-1">招財獵犬 · 為您加持</p>
                </div>
            </div>
            
            <div class="absolute top-4 right-4 flex items-center gap-1 opacity-60">
                <div class="w-2 h-2 rounded-full bg-green-400"></div>
                <span class="text-[10px]">本地模式</span>
            </div>
        </div>

        <div class="p-8">
            <!-- 星等選擇 -->
            <div class="mb-8">
                <label class="block text-gray-700 font-bold mb-4 text-center">請選擇欲投注星等</label>
                <div class="flex justify-between gap-2">
                    <button onclick="setStar(2)" id="btn-2" class="star-btn flex-1 py-3 rounded-xl border-2 border-gray-200 hover:border-rose-500 transition-all font-bold text-gray-600">2星</button>
                    <button onclick="setStar(3)" id="btn-3" class="star-btn flex-1 py-3 rounded-xl border-2 border-gray-200 hover:border-rose-500 transition-all font-bold text-gray-600">3星</button>
                    <button onclick="setStar(4)" id="btn-4" class="star-btn flex-1 py-3 rounded-xl border-2 border-gray-200 hover:border-rose-500 transition-all font-bold text-gray-600">4星</button>
                    <button onclick="setStar(5)" id="btn-5" class="star-btn flex-1 py-3 rounded-xl border-2 border-rose-500 bg-rose-50 text-rose-600 transition-all font-bold">5星</button>
                </div>
            </div>

            <!-- 選號顯示區 -->
            <div id="balls-container" class="flex flex-wrap justify-center gap-4 min-h-[80px] mb-8">
                <div class="text-gray-400 italic text-sm">點擊下方按鈕，讓招財犬為您選號</div>
            </div>

            <!-- 主按鈕 -->
            <button id="generate-btn" onclick="generateNumbers()" class="w-full lottery-gradient text-white font-bold py-4 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all text-xl mb-6">
                一鍵自動選號
            </button>

            <!-- 歷史紀錄 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-bold text-gray-700">最近 10 筆本地紀錄</h3>
                    <button onclick="clearAllHistory()" class="text-[10px] text-gray-400 hover:text-rose-500 underline">清空紀錄</button>
                </div>
                <div id="history-container" class="max-h-60 overflow-y-auto custom-scrollbar space-y-2 pr-1">
                    <!-- 紀錄將由 JavaScript 動態插入 -->
                </div>
            </div>

            <!-- 說明區 -->
            <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">使用說明</h3>
                <ul class="text-xs text-gray-400 space-y-1">
                    <li>• 資料儲存：紀錄僅儲存於此瀏覽器中。</li>
                    <li>• 認證商標：[招財金牌獵犬] 官方正版授權。</li>
                    <li>• 提示：祝您好運大中獎！</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let currentStar = 5;
        let history = [];
        const STORAGE_KEY = 'lottery_539_history';

        // 權重數據
        const weights = {
            1: 85, 2: 70, 3: 92, 4: 65, 5: 88, 6: 74, 7: 81, 8: 69, 9: 95, 10: 72,
            11: 78, 12: 83, 13: 61, 14: 90, 15: 87, 16: 76, 17: 99, 18: 68, 19: 82, 20: 75,
            21: 89, 22: 64, 23: 93, 24: 71, 25: 86, 26: 73, 27: 80, 28: 67, 29: 96, 30: 77,
            31: 84, 32: 63, 33: 91, 34: 79, 35: 66, 36: 94, 37: 75, 38: 62, 39: 98
        };

        function loadHistory() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    history = JSON.parse(saved);
                    updateHistoryUI();
                } catch (e) {
                    history = [];
                }
            }
        }

        function saveHistory() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function updateHistoryUI() {
            const historyContainer = document.getElementById('history-container');
            if (history.length === 0) {
                historyContainer.innerHTML = '<div class="text-center py-8 text-gray-300 text-xs border-2 border-dashed border-gray-100 rounded-xl">尚無紀錄</div>';
                return;
            }

            historyContainer.innerHTML = '';
            history.forEach((record) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm';
                const date = new Date(record.timestamp);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                const starLabel = `<span class="px-2 py-0.5 bg-rose-100 text-rose-600 rounded text-[10px] font-bold mr-3">${record.star}星</span>`;
                const numbers = record.nums.map(n => n < 10 ? '0' + n : n).join(' , ');
                item.innerHTML = `<div class="flex items-center">${starLabel}<span class="font-mono text-gray-600 font-bold">${numbers}</span></div><span class="text-[10px] text-gray-400">${timeStr}</span>`;
                historyContainer.appendChild(item);
            });
        }

        window.setStar = (num) => {
            currentStar = num;
            document.querySelectorAll('.star-btn').forEach(btn => {
                btn.classList.remove('border-rose-500', 'bg-rose-50', 'text-rose-600');
                btn.classList.add('border-gray-200', 'text-gray-600');
            });
            const activeBtn = document.getElementById(`btn-${num}`);
            activeBtn.classList.add('border-rose-500', 'bg-rose-50', 'text-rose-600');
            activeBtn.classList.remove('border-gray-200', 'text-gray-600');
        };

        window.generateNumbers = () => {
            const container = document.getElementById('balls-container');
            container.innerHTML = ''; 
            let selected = [];
            let availableNumbers = Array.from({length: 39}, (_, i) => i + 1);
            for (let i = 0; i < currentStar; i++) {
                let totalWeight = availableNumbers.reduce((sum, num) => sum + weights[num], 0);
                let random = Math.random() * totalWeight;
                let cumulativeWeight = 0;
                for (let j = 0; j < availableNumbers.length; j++) {
                    cumulativeWeight += weights[availableNumbers[j]];
                    if (random <= cumulativeWeight) {
                        const picked = availableNumbers.splice(j, 1)[0];
                        selected.push(picked);
                        break;
                    }
                }
            }
            const results = selected.sort((a, b) => a - b);
            history.unshift({ star: currentStar, nums: results, timestamp: Date.now() });
            if (history.length > 10) history.pop();
            saveHistory();
            updateHistoryUI();
            results.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    const displayNum = num < 10 ? '0' + num : num;
                    ball.className = weights[num] > 95 
                        ? `ball w-12 h-12 flex items-center justify-center rounded-full bg-rose-500 text-white font-bold text-lg shadow-lg`
                        : `ball w-12 h-12 flex items-center justify-center rounded-full bg-white border-2 border-rose-500 text-rose-600 font-bold text-lg shadow-md`;
                    ball.innerText = displayNum;
                    container.appendChild(ball);
                }, index * 100);
            });
        };

        window.clearAllHistory = () => {
            if (!confirm('確定要清空本地歷史紀錄嗎？')) return;
            history = [];
            localStorage.removeItem(STORAGE_KEY);
            updateHistoryUI();
        };

        window.onload = () => {
            loadHistory();
            setStar(5);
        };
    </script>
</body>
</html>
